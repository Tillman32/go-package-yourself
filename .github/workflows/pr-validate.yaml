# CI workflow for pull request validation.
#
# This validates `gpy` in two ways:
# 1. against the dedicated consumer sandbox repo (`Tillman32/gpy-test`)
# 2. against this repo's generated release workflow via `workflow_call`
#
# The sandbox job exercises the real dogfooding path by building `gpy` from the
# PR branch, running it against a separate checkout with `--project-root`, and
# failing if committed generated outputs in the sandbox would change.
#
# Publishing steps are intentionally skipped in `release-dry-run` because no
# secrets are passed, so the `if: env.SECRET != ''` guards in
# `gpy-release.yaml` short-circuit all pushes.

name: PR Validate

on:
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      - name: Run tests (with race detection)
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      - name: go vet
        run: go vet ./...

  sandbox-gpy:
    name: Validate gpy against sandbox repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sandbox repo
        uses: actions/checkout@v4
        with:
          repository: Tillman32/gpy-test
          path: gpy-test

      - uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      - name: Build gpy
        run: go build -o gpy -ldflags "-X main.Version=$(cat VERSION)" ./cmd/gpy

      - name: gpy version
        run: ./gpy version

      - name: Sandbox repo tests
        working-directory: gpy-test
        run: go test ./...

      - name: Sandbox repo build
        working-directory: gpy-test
        run: go build ./...

      - name: Regenerate sandbox packaging artifacts
        run: ./gpy --project-root "$GITHUB_WORKSPACE/gpy-test" package --sync

      - name: Regenerate sandbox workflow
        run: ./gpy --project-root "$GITHUB_WORKSPACE/gpy-test" workflow --sync

      - name: Verify sandbox repo is unchanged
        working-directory: gpy-test
        run: |
          if [[ -n "$(git status --short)" ]]; then
            git status --short
            git diff
            echo "::error::Sandbox repo outputs are out of sync. Regenerate in Tillman32/gpy-test and commit the result."
            exit 1
          fi

  # Keep this separate from the sandbox validation above. It still validates
  # this repo's generated reusable workflow end-to-end, even though generated
  # consumer workflows are not yet self-bootstrapping in external repos.
  release-dry-run:
    name: Release dry-run (no publish)
    uses: ./.github/workflows/gpy-release.yaml
    # secrets: intentionally omitted — withholds NPM_TOKEN, CHOCOLATEY_API_KEY,
    # HOMEBREW_CORE_PAT so all publish jobs no-op via their existing guards.
