# GitHub Actions workflow for releasing binaries
# Generated by gpy (go-package-yourself)
# DO NOT EDIT - regenerate with: gpy workflow --write

name: Release
"on":
    push:
        tags:
            - v*
    workflow_call: {}
jobs:
    build:
        runs-on: ${{ matrix.runs-on }}
        strategy:
            matrix:
                include:
                    - os: darwin
                      arch: amd64
                      runs-on: macos-latest
                      archive: go-package-yourself__darwin_amd64.tar.gz
                      bin-path: go-package-yourself
                      ext: .tar.gz
                    - os: darwin
                      arch: arm64
                      runs-on: macos-latest
                      archive: go-package-yourself__darwin_arm64.tar.gz
                      bin-path: go-package-yourself
                      ext: .tar.gz
                    - os: linux
                      arch: amd64
                      runs-on: ubuntu-latest
                      archive: go-package-yourself__linux_amd64.tar.gz
                      bin-path: go-package-yourself
                      ext: .tar.gz
                    - os: linux
                      arch: arm64
                      runs-on: ubuntu-latest
                      archive: go-package-yourself__linux_arm64.tar.gz
                      bin-path: go-package-yourself
                      ext: .tar.gz
                    - os: windows
                      arch: amd64
                      runs-on: windows-latest
                      archive: go-package-yourself__windows_amd64.zip
                      bin-path: go-package-yourself.exe
                      ext: .zip
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                go-version: "1.22"
            - name: Build binary
              env:
                GOARCH: ${{ matrix.arch }}
                GOOS: ${{ matrix.os }}
              run: go build -o go-package-yourself -ldflags "-X main.Version=${{ github.ref_name }}" ./cmd/gpy
            - name: Create archive
              env:
                ARCHIVE: ${{ matrix.archive }}
                BIN_PATH: ${{ matrix.bin-path }}
                EXT: ${{ matrix.ext }}
              run: |-
                if [ "${{ runner.os }}" = "Windows" ]; then
                  cd "${{ env.BIN_PATH_DIR }}" 2>/dev/null || true
                  powershell -Command "Compress-Archive -Path ${{ env.BIN_PATH }} -DestinationPath ${{ env.ARCHIVE }} -Force"
                else
                  tar czf "${{ env.ARCHIVE }}" "${{ env.BIN_PATH }}"
                fi
            - name: Generate checksums
              run: |-
                sha256sum "${{ env.ARCHIVE }}" | sed 's/  .*\//  /' >> checksums.txt
                echo "${{ env.ARCHIVE }}" >> release-files.txt
                echo checksums.txt >> release-files.txt
            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                files: release-files.txt
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    publish-chocolatey:
        needs:
            - build
        runs-on: windows-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                go-version: "1.22"
            - name: Generate Chocolatey package
              run: |-
                # Generate chocolatey package using gpy
                go run ./cmd/gpy --config gpy.yaml package --only chocolatey --output "pkg"
            - name: Pack Chocolatey package
              run: |-
                # Navigate to generated package and pack it
                cd "pkg\chocolatey\*"
                choco pack
            - name: Push to Chocolatey
              env:
                ChocolateyApiKey: ${{ secrets.CHOCOLATEY_API_KEY }}
              if: env.ChocolateyApiKey != ''
              run: |-
                # Push the generated .nupkg to Chocolatey.org
                cd "pkg\chocolatey\*"
                $nupkg = Get-ChildItem -Filter "*.nupkg" | Select-Object -First 1
                choco push "$($nupkg.FullName)" --source=https://push.chocolatey.org/
    publish-homebrew:
        needs:
            - build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                go-version: "1.22"
            - name: Generate Homebrew formula and create PR
              env:
                GH_TOKEN: ${{ secrets.HOMEBREW_CORE_PAT }}
              if: env.GH_TOKEN != ''
              run: |-
                #!/bin/bash
                set -e

                # Create temporary directory for formula generation
                TEMP_DIR=$(mktemp -d)
                trap "rm -rf $TEMP_DIR" EXIT

                # Generate homebrew formula
                go run ./cmd/gpy --config gpy.yaml package --only homebrew --output "$TEMP_DIR/homebrew"

                # Configure git
                git config --global user.name "gpy-bot"
                git config --global user.email "gpy@github.local"

                # Clone/fork homebrew-core (using GitHub CLI)
                BRANCH_NAME="gpy-$(git rev-parse --short HEAD)"
                gh repo fork homebrew/homebrew-core --clone --branch "$BRANCH_NAME"

                # Copy generated formula to the fork
                cd homebrew-core
                FORMULA_FILE=$(find ../temp_dir/homebrew -name "*.rb" -type f | head -1)
                FORMULA_NAME=$(basename "$FORMULA_FILE")
                cp "$FORMULA_FILE" "Formula/$FORMULA_NAME"

                # Commit and push
                git add "Formula/$FORMULA_NAME"
                git commit -m "feat: add gpy-generated formula for $(basename $FORMULA_FILE .rb)"
                git push origin "$BRANCH_NAME"

                # Create PR
                gh pr create \
                  --repo homebrew/homebrew-core \
                  --title "feat: add formula for $(basename $FORMULA_FILE .rb)" \
                  --body "Generated by [gpy](https://github.com/users/gpy-bot/repos)" \
                  --head "$(git config --global user.name):$BRANCH_NAME"
    publish-npm:
        needs:
            - build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: "18"
                registry-url: https://registry.npmjs.org/
            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                go-version: "1.22"
            - name: Generate and publish npm package
              env:
                NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              if: env.NODE_AUTH_TOKEN != ''
              run: |-
                #!/bin/bash
                set -e

                # Create temporary directory for package generation
                TEMP_DIR=$(mktemp -d)
                trap "rm -rf $TEMP_DIR" EXIT

                # Generate npm package using Go
                go run ./cmd/gpy --config gpy.yaml package --only npm --output "$TEMP_DIR/npm"

                # Navigate to generated package and publish
                cd "$TEMP_DIR/npm/go-package-yourself"
                npm publish
